{% extends 'base.html' %}
{% block title %}Register — CloudVault{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">⬡</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Start storing your files securely</p>
        </div>

        <form class="auth-form" method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="yourname" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn-primary">
                <span>Create Account</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('login') }}" class="auth-link">Sign in</a>
        </p>
    </div>

    <div class="auth-bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>
</div>
{% endblock %}
