{% extends 'base.html' %}
{% block title %}Login — CloudVault{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">⬡</div>
            <h1 class="auth-title">CloudVault</h1>
            <p class="auth-subtitle">Secure cloud storage for everything</p>
        </div>

        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">
                <span>Sign In</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>

        <p class="auth-switch">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="auth-link">Create one</a>
        </p>
    </div>

    <div class="auth-bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>
</div>
{% endblock %}
