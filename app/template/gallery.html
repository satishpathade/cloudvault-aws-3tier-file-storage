{% extends 'base.html' %}
{% block title %}Gallery | Cloud Storage{% endblock %}

{% block content %}
<div class="dashboard">
    <h1>File Gallery</h1>
    <div class="file-grid">
        {% for file in files %}
        <div class="file-card">
            <img src="{{ file.file_url }}" alt="{{ file.filename }}" title="{{ file.filename }}">
            <h3>{{ file.filename }}</h3>
        </div>
        {% else %}
        <div class="card">
            <h2>No files yet</h2>
            <p>Upload your first file from the Upload page.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
