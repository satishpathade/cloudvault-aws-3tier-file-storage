plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

filters:
  tag:Project: cloudvault
  instance-state-name: running

# Groups servers by ASG name
keyed_groups:
  - key: tags.aws_autoscaling_groupName
    prefix: ""
    separator: ""

compose:
  ansible_host: private_ip_address

vars:
  ansible_user: ec2-user          # Amazon Linux uses ec2-user
  ansible_ssh_private_key_file: ~/.ssh/cloudvault-cicd.pem