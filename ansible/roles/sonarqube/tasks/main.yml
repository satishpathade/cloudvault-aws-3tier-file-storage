---
- name: Run SonarQube container
  shell: |
    docker run -d \
    --name sonarqube \
    --restart unless-stopped \
    -p 9000:9000 \
    sonarqube:lts-community
  ignore_errors: true

- name: Download Sonar Scanner
  ansible.builtin.get_url:
    url: https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
    dest: /tmp/sonar-scanner.zip
    mode: '0644'

- name: Unzip Sonar Scanner
  ansible.builtin.unarchive:
    src: /tmp/sonar-scanner.zip
    dest: /opt/
    remote_src: true
    creates: /opt/sonar-scanner-4.8.0.2856-linux

- name: Create symbolic link for sonar-scanner
  ansible.builtin.file:
    src: /opt/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner
    dest: /usr/local/bin/sonar-scanner
    state: link

- name: Verify Sonar Scanner installation
  ansible.builtin.command: sonar-scanner --version
  register: sonar_scanner_version
  changed_when: false

- name: Display Sonar Scanner version
  ansible.builtin.debug:
    var: sonar_scanner_version.stdout_lines