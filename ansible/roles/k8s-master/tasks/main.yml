---
- name: Initialize Kubernetes Cluster with kubeadm
  shell: "kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_default_ipv4.address }}"
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create .kube directory for ec2-user
  file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Copy admin.conf to ec2-user kubeconfig location
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ec2-user/.kube/config
    remote_src: true
    owner: ec2-user
    group: ec2-user
    mode: '0600'

- name: Wait for local Kubernetes admin configuration file readiness
  ansible.builtin.wait_for:
    path: /etc/kubernetes/admin.conf
    state: present
    timeout: 60

- name: Install Flannel CNI
  shell: |
    kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config
  changed_when: true

- name: Generate worker join command
  shell: kubeadm token create --print-join-command
  register: join_command
  changed_when: false

- name: Copy join command to worker
  copy:
    content: "{{ join_command.stdout }}\n"
    dest: /tmp/kube_join_command.sh
    mode: '0755'

- name: Join worker node to cluster
  fetch:
    src: /tmp/kube_join_command.sh
    dest: /tmp/kube_join_command.sh
    flat: true