---
- name: Disable swap immediately
  shell: swapoff -a
  changed_when: true

- name: Remove swap entry from fstab permanently
  replace:
    path: /etc/fstab
    regexp: '^(.*swap.*)$'
    replace: '# \1'

- name: Load overlay and br_netfilter kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules on reboot
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'

- name: Configure Kubernetes networking sysctl rules
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    mode: '0644'

- name: Apply sysctl system settings
  command: sysctl --system
  changed_when: true

- name: Install required networking dependencies and containerd
  dnf:
    name:
      - socat
      - conntrack
      - containerd
    state: present

- name: Create containerd configuration directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Generate default containerd configuration
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Configure SystemdCgroup driver for containerd cleanly
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*SystemdCgroup\s*=\s*(true|false)'
    line: '            SystemdCgroup = true'
    insertafter: '\[plugins\."io\.containerd\.grpc\.v1\.cri"\.containerd\.runtimes\.runc\.options\]'

- name: Restart and enable containerd service
  service:
    name: containerd
    state: restarted
    enabled: true

- name: Verify containerd service status
  shell: systemctl is-active containerd
  register: containerd_status
  failed_when: containerd_status.stdout != "active"
  changed_when: false

- name: Add official Kubernetes package repository
  copy:
    dest: /etc/yum.repos.d/kubernetes.repo
    content: |
      [kubernetes]
      name=Kubernetes
      baseurl=https://pkgs.k8s.io/core:/stable:/v1.30/rpm/
      enabled=1
      gpgcheck=1
      gpgkey=https://pkgs.k8s.io/core:/stable:/v1.30/rpm/repodata/repomd.xml.key
    mode: '0644'

- name: Install Kubernetes core packages (kubelet, kubeadm, kubectl)
  dnf:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: all

- name: Enable and start kubelet system service
  service:
    name: kubelet
    state: started
    enabled: true