---
- name: Install Java
  dnf:
    name: java-21-amazon-corretto
    state: present

- name: Add Jenkins repository
  get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Import Jenkins GPG key
  rpm_key:
    state: present
    key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

- name: Install Jenkins
  dnf:
    name: jenkins
    state: present

- name: start & enable Jenkins
  service:
    name: jenkins
    state: started
    enabled: true

- name: adding jenkins user to ec2-user group.
  user:
    name: jenkins
    groups:
      - ec2-user
      - docker
    append: yes

- name: jenkins sudo privilege
  copy:
    dest: /etc/sudoers.d/jenkins
    content: "jenkins ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"

- name: Create Jenkins kube directory
  file:
    path: /var/lib/jenkins/.kube
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0700"

- name: Copy kubeconfig to Jenkins
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /var/lib/jenkins/.kube/config
    remote_src: true
    owner: jenkins
    group: jenkins
    mode: "0600"
